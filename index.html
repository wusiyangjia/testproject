<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>银行流水 · 下载监控</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="ambient-glow ambient-glow--top"></div>
<div class="ambient-glow ambient-glow--bottom"></div>

<div class="app-container">

  <!-- ═══ Header ═══ -->
  <header class="page-header">
    <div class="brand-col">
      <span class="brand-tag">Automated Pipeline Monitor</span>
      <h1 class="brand-title">银行流水<em>下载监控</em></h1>
    </div>
    <div class="header-actions">
      <button class="btn btn--ghost" onclick="handleRefresh()" title="刷新数据">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        刷新
      </button>
    </div>
  </header>

  <!-- ═══ 统计卡片 ═══ -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card" style="--accent-color:#2563eb">
      <div class="stat-label">账户总数</div>
      <div class="stat-value stat-value--accent" id="statTotal">0</div>
      <div class="stat-sub">涵盖 6 家银行</div>
    </div>
    <div class="stat-card" style="--accent-color:#9ca3af">
      <div class="stat-label">等待中</div>
      <div class="stat-value" style="color:#9ca3af" id="statPending">0</div>
      <div class="stat-sub">排队等待下载</div>
    </div>
    <div class="stat-card" style="--accent-color:#3b82f6">
      <div class="stat-label">网银登录</div>
      <div class="stat-value" style="color:#3b82f6" id="statLoggingIn">0</div>
      <div class="stat-sub"><span class="status-dot" style="background:#3b82f6;display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;animation:statusPulse 1.4s ease-in-out infinite;"></span>正在登录网银</div>
    </div>
    <div class="stat-card" style="--accent-color:#2563eb">
      <div class="stat-label">流水下载</div>
      <div class="stat-value" style="color:#2563eb" id="statDownloading">0</div>
      <div class="stat-sub"><span class="status-dot" style="background:#2563eb;display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;animation:statusPulse 1.4s ease-in-out infinite;"></span>下载交易流水</div>
    </div>
    <div class="stat-card" style="--accent-color:#f59e0b">
      <div class="stat-label">数据加工</div>
      <div class="stat-value" style="color:#f59e0b" id="statProcessing">0</div>
      <div class="stat-sub">格式化 / 入库</div>
    </div>
    <div class="stat-card" style="--accent-color:#10b981">
      <div class="stat-label">已完成</div>
      <div class="stat-value" style="color:#10b981" id="statCompleted">0</div>
      <div class="stat-sub"><span class="positive">●</span> 可查看流水</div>
    </div>
    <div class="stat-card" style="--accent-color:#ef4444">
      <div class="stat-label">失败</div>
      <div class="stat-value" style="color:#ef4444" id="statFailed">0</div>
      <div class="stat-sub"><span class="negative">●</span> 需人工处理</div>
    </div>
  </div>

  <!-- ═══════════════ 仪表盘视图 ═══════════════ -->
  <div id="viewDashboard">

    <!-- 筛选面板 -->
    <div class="filter-panel">
      <div class="filter-group filter-group--grow">
        <label class="filter-label">搜索</label>
        <input type="text" class="filter-input" id="filterSearch" placeholder="银行名称、支行、账户名、账号…" oninput="handleDashboardSearch()">
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group">
        <label class="filter-label">银行</label>
        <select class="filter-input filter-input--select" id="filterBank" onchange="handleDashboardBankFilter()">
          <option value="all">全部银行</option>
        </select>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group">
        <label class="filter-label">状态</label>
        <select class="filter-input filter-input--select" id="filterStatus" onchange="handleDashboardStatusFilter()">
          <option value="all">全部状态</option>
        </select>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-group filter-group--shrink">
        <button class="btn btn--ghost" onclick="resetDashboardFilters()" style="height:38px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          重置
        </button>
      </div>
    </div>

    <!-- 筛选标签 -->
    <div style="margin-bottom:20px;display:flex;gap:8px;flex-wrap:wrap;" id="activeBadges"></div>

    <!-- 账户表格 -->
    <div class="table-shell">
      <div class="table-header-bar">
        <div class="table-header-bar__left">
          <span class="result-count" id="dashboardResultCount">0<span>个账户</span></span>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>银行 / 支行</th>
              <th>账号</th>
              <th onclick="sortDashboardBy('status')" id="th-status">状态 <span class="sort-arrow">↕</span></th>
              <th>进度</th>
              <th onclick="sortDashboardBy('lastUpdated')" id="th-updated">最近更新 <span class="sort-arrow">↕</span></th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="dashboardBody"></tbody>
        </table>
      </div>
      <div class="pagination-bar">
        <div class="pagination-info" id="dashboardPaginationInfo"></div>
        <div class="pagination-controls" id="dashboardPaginationControls"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ 明细视图 ═══════════════ -->
  <div id="viewDetail" style="display:none;">

    <!-- 面包屑导航 -->
    <div class="breadcrumb-bar">
      <button class="btn btn--ghost" onclick="navigateToDashboard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        返回监控面板
      </button>
      <div class="breadcrumb-info">
        <span class="breadcrumb-bank" id="detailBankName"></span>
        <span class="breadcrumb-sep">·</span>
        <span class="breadcrumb-branch" id="detailSubBranch"></span>
      </div>
    </div>

    <!-- 账户摘要 -->
    <div class="detail-summary" id="detailAccountInfo"></div>

    <!-- 流水表格 -->
    <div class="table-shell">
      <div class="table-header-bar">
        <div class="table-header-bar__left">
          <span class="result-count" id="detailResultCount">0<span>条记录</span></span>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th onclick="sortDetailBy('date')" id="th-ddate">交易日期 <span class="sort-arrow">↕</span></th>
              <th onclick="sortDetailBy('typeLabel')" id="th-dtype">类型 <span class="sort-arrow">↕</span></th>
              <th>对方信息</th>
              <th>对方账号</th>
              <th onclick="sortDetailBy('amount')" id="th-damount">金额 <span class="sort-arrow">↕</span></th>
              <th onclick="sortDetailBy('balance')" id="th-dbalance">余额 <span class="sort-arrow">↕</span></th>
              <th>摘要 / 备注</th>
            </tr>
          </thead>
          <tbody id="detailBody"></tbody>
        </table>
      </div>
      <div class="pagination-bar">
        <div class="pagination-info" id="detailPaginationInfo"></div>
        <div class="pagination-controls" id="detailPaginationControls"></div>
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg class="toast__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
  </svg>
  <span id="toastMsg">操作成功</span>
</div>

<!-- Scripts -->
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>

</body>
</html>
